# =========================
# Server
# =========================
server.port=8080

# =========================
# Datasource (PostgreSQL)
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5432/securitycourse
spring.datasource.username=securitycourse
spring.datasource.password=${DB_PASSWORD:securitycourse}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA / Hibernate
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# =========================
# Flyway
# =========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
app.flyway.auto-repair=true

# =========================
# Logging
# =========================
logging.level.org.flywaydb=INFO
logging.level.com.example.securitycourse=INFO

# =========================
# JWT
# =========================
app.security.jwt.secret=${JWT_SECRET:ThisIsMyVeryLongSecretKeyForJWT_AtLeast32Chars_2026!}
app.security.jwt.ttl-seconds=3600
app.security.jwt.issuer=securitycourse

# =========================
# 2FA / TOTP
# =========================
app.security.totp.issuer=CorpSec
app.security.totp.window=1
app.security.mfa.pending-ttl-seconds=300

# =========================
# \u0428\u0438\u0444\u0440\u043e\u0432\u0430\u043d\u0438\u0435 \u0441\u0435\u043a\u0440\u0435\u0442\u043e\u0432 \u0432 \u0411\u0414 (AES-GCM)
# =========================
# \u0412 production \u0437\u0430\u0434\u0430\u0432\u0430\u0442\u044c \u0447\u0435\u0440\u0435\u0437 \u043f\u0435\u0440\u0435\u043c\u0435\u043d\u043d\u0443\u044e \u043e\u043a\u0440\u0443\u0436\u0435\u043d\u0438\u044f APP_ENCRYPTION_KEY.
# \u0415\u0441\u043b\u0438 \u043a\u043b\u044e\u0447 \u043f\u043e\u0442\u0435\u0440\u044f\u043d \u2014 \u0437\u0430\u0448\u0438\u0444\u0440\u043e\u0432\u0430\u043d\u043d\u044b\u0435 \u0434\u0430\u043d\u043d\u044b\u0435 \u0432\u043e\u0441\u0441\u0442\u0430\u043d\u043e\u0432\u0438\u0442\u044c \u043d\u0435\u043b\u044c\u0437\u044f.
app.security.encryption.key=${APP_ENCRYPTION_KEY:DEV-ONLY-INSECURE-KEY-CHANGE-IN-PRODUCTION-32+chars-please}

# =========================
# Bootstrap admin (\u0442\u043e\u043b\u044c\u043a\u043e \u0434\u043b\u044f dev/demo)
# =========================
app.bootstrap.admin.enabled=true
app.bootstrap.admin.username=admin
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:Admin123!}
app.bootstrap.admin.email=admin@example.com

# =========================
# Email (SMTP) \u2014 \u043d\u0430\u0441\u0442\u0440\u043e\u0439\u043a\u0438 \u0438\u0437 \u0411\u0414 (admin/alert-settings)
# =========================
spring.mail.host=smtp.yandex.ru
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# =========================
# \u041a\u043e\u0440\u0440\u0435\u043b\u044f\u0446\u0438\u044f
# =========================
app.correlation.enabled=true
app.correlation.brute-force.window-minutes=5
app.correlation.brute-force.threshold=5
app.correlation.credential-stuffing.window-minutes=10
app.correlation.credential-stuffing.distinct-users-threshold=5
app.correlation.off-hours.start=20
app.correlation.off-hours.end=7
app.correlation.mass-export.window-minutes=10
app.correlation.mass-export.threshold=10

# =========================
# Hash chain (\u0446\u0435\u043b\u043e\u0441\u0442\u043d\u043e\u0441\u0442\u044c \u0430\u0443\u0434\u0438\u0442\u0430)
# =========================
app.audit.hash-chain.enabled=true
app.audit.hash-chain.genesis=GENESIS