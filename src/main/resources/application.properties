# --- Server ---
server.port=8080

# --- Datasource (\u043b\u043e\u043a\u0430\u043b\u044c\u043d\u044b\u0439 PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/securitycourse
spring.datasource.username=securitycourse
spring.datasource.password=securitycourse
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# --- Logging ---
logging.level.org.flywaydb=INFO

# --- JWT ---
app.security.jwt.secret=ThisIsMyVeryLongSecretKeyForJWT_AtLeast32Chars_2026!
app.security.jwt.expiration=3600000
app.security.jwt.issuer=securitycourse