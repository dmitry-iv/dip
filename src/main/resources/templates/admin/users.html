<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section})}">
<section>
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h2 class="h4 mb-0">Пользователи</h2>
        <a class="btn btn-primary" th:href="@{/admin/users/new}"><i class="bi bi-plus-lg"></i> Добавить</a>
    </div>

    <div th:if="${param.created}" class="alert alert-success">Пользователь создан.</div>
    <div th:if="${param.updated}" class="alert alert-success">Пользователь обновлён.</div>
    <div th:if="${param.deleted}" class="alert alert-warning">Пользователь удалён.</div>
    <div th:if="${param.locked}" class="alert alert-warning">Пользователь заблокирован.</div>
    <div th:if="${param.unlocked}" class="alert alert-success">Пользователь разблокирован.</div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Enabled</th>
                    <th>Failed</th>
                    <th>Lock until</th>
                    <th>Roles</th>
                    <th class="text-end">Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users.content}">
                    <td th:text="${u.username}">user</td>
                    <td th:text="${u.email} ?: '-'">-</td>
                    <td>
                        <span th:class="${u.enabled} ? 'badge text-bg-success' : 'badge text-bg-secondary'"
                              th:text="${u.enabled} ? 'yes' : 'no'">yes</span>
                    </td>
                    <td th:text="${u.failedLoginAttempts}">0</td>
                    <td th:text="${u.lockUntil} ?: '-'">-</td>
                    <td>
                        <span class="badge text-bg-dark me-1" th:each="r : ${u.roles}" th:text="${r}">USER</span>
                    </td>
                    <td class="text-end">
                        <a class="btn btn-sm btn-outline-primary" th:href="@{'/admin/users/' + ${u.id} + '/edit'}">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{'/admin/users/' + ${u.id} + '/lock'}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button class="btn btn-sm btn-outline-warning" type="submit" title="Lock"><i class="bi bi-lock"></i></button>
                        </form>
                        <form th:action="@{'/admin/users/' + ${u.id} + '/unlock'}" method="post" class="d-inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button class="btn btn-sm btn-outline-success" type="submit" title="Unlock"><i class="bi bi-unlock"></i></button>
                        </form>
                        <form th:action="@{'/admin/users/' + ${u.id} + '/delete'}" method="post" class="d-inline" onsubmit="return confirm('Удалить пользователя?');">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button class="btn btn-sm btn-outline-danger" type="submit" title="Delete"><i class="bi bi-trash"></i></button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-3">
        <div class="text-muted small">
            Страница <span th:text="${users.number + 1}">1</span> из <span th:text="${users.totalPages}">1</span>
        </div>
        <div class="btn-group">
            <a class="btn btn-outline-secondary btn-sm" th:classappend="${users.first}? 'disabled'" th:href="@{/admin/users(page=${users.number - 1})}">Назад</a>
            <a class="btn btn-outline-secondary btn-sm" th:classappend="${users.last}? 'disabled'" th:href="@{/admin/users(page=${users.number + 1})}">Вперёд</a>
        </div>
    </div>
</section>
</html>
