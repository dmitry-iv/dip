<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::section})}">
<section>
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h2 class="h4 mb-0" th:text="${mode == 'create'} ? 'Создание пользователя' : 'Редактирование пользователя'">Форма</h2>
        <a class="btn btn-outline-secondary" th:href="@{/admin/users}"><i class="bi bi-arrow-left"></i> Назад</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <form th:action="${mode == 'create'} ? @{/admin/users/new} : @{'/admin/users/' + ${userId} + '/edit'}" method="post" th:object="${form}">
                <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                    <div th:each="e : ${#fields.globalErrors()}" th:text="${e}">Ошибка</div>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Username</label>
                        <input class="form-control" th:field="*{username}" />
                        <div class="text-danger small" th:errors="*{username}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input class="form-control" th:field="*{email}" />
                        <div class="text-danger small" th:errors="*{email}"></div>
                    </div>

                    <div class="col-md-6" th:if="${mode == 'create'}">
                        <label class="form-label">Password</label>
                        <input class="form-control" type="password" th:field="*{password}" />
                        <div class="text-danger small" th:errors="*{password}"></div>
                        <div class="form-text">Мин. 8 символов, 1 uppercase, 1 цифра, 1 спецсимвол.</div>
                    </div>

                    <div class="col-md-6" th:if="${mode == 'edit'}">
                        <label class="form-label">Enabled</label>
                        <select class="form-select" th:field="*{enabled}">
                            <option th:value="true">true</option>
                            <option th:value="false">false</option>
                        </select>
                    </div>

                    <div class="col-12">
                        <label class="form-label">Roles</label>
                        <div class="d-flex flex-wrap gap-2">
                            <div class="form-check" th:each="r : ${allRoles}">
                                <input class="form-check-input" type="checkbox" th:value="${r}" th:field="*{roles}" />
                                <label class="form-check-label" th:text="${r}">ROLE</label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button class="btn btn-primary" type="submit"><i class="bi bi-check2"></i> Сохранить</button>
                    <a class="btn btn-outline-secondary" th:href="@{/admin/users}">Отмена</a>
                </div>
            </form>

        </div>
    </div>
</section>
</html>
