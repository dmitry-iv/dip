<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Профиль</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>
<body class="container mt-4">
    <h2>Профиль</h2>
    <p>Имя пользователя: <span th:text="${user.username}">...</span></p>
    <p>Email: <span th:text="${user.email}">...</span></p>
    <p>Активен: <span th:text="${user.enabled} ? 'Да' : 'Нет'">...</span></p>
    <p>Двухфакторная аутентификация:
        <span th:if="${user.totpEnabled}" class="badge bg-success">Включена</span>
        <span th:unless="${user.totpEnabled}" class="badge bg-secondary">Отключена</span>
        <a th:href="@{/profile/totp}" class="btn btn-sm btn-outline-primary ms-2">Настроить</a>
    </p>
    <h3>Сменить пароль</h3>
    <form th:action="@{/profile/password}" method="post" th:object="${passwordForm}">
        <div class="mb-3">
            <label>Текущий пароль</label>
            <input type="password" th:field="*{currentPassword}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Новый пароль</label>
            <input type="password" th:field="*{newPassword}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Подтверждение</label>
            <input type="password" th:field="*{confirmPassword}" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Сменить пароль</button>
    </form>
</body>
</html>
