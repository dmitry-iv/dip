<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>2FA включена</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h2>Двухфакторная аутентификация включена</h2>
    <p>Резервные коды (сохраните):</p>
    <ul>
        <li th:each="code : ${backupCodes}" th:text="${code}"></li>
    </ul>
    <form th:action="@{/profile/totp/disable}" method="post" class="mt-3">
        <button type="submit" class="btn btn-danger">Отключить 2FA</button>
    </form>
    <a th:href="@{/profile}" class="btn btn-secondary">Вернуться в профиль</a>
</body>
</html>
