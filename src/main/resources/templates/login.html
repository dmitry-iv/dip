<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Вход — CorpSec</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <style>
        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a2128;
            --bg-tertiary: #252d36;
            --border-color: #2d3640;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent: #ff7a00;
            --critical: #f85149;
            --info: #56d364;
        }
        body {
            background: radial-gradient(ellipse at top, #1a2128 0%, #0f1419 60%);
            color: var(--text-primary);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-wrap {
            width: 100%;
            max-width: 440px;
        }
        .brand-block {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand-block .logo {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        .brand-block h1 {
            font-weight: 700;
            letter-spacing: 1px;
            margin: 0;
        }
        .brand-block .accent { color: var(--accent); }
        .brand-block .subtitle {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            letter-spacing: 0.5px;
        }
        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .form-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
        }
        .form-control {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.7rem 1rem;
        }
        .form-control:focus {
            background: var(--bg-tertiary);
            border-color: var(--accent);
            color: var(--text-primary);
            box-shadow: 0 0 0 0.2rem rgba(255, 122, 0, 0.15);
        }
        .btn-login {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: background 0.15s ease;
        }
        .btn-login:hover { background: #ff9233; color: #fff; }

        .alert-soc {
            border-radius: 6px;
            padding: 0.7rem 1rem;
            font-size: 0.875rem;
            border: 1px solid;
        }
        .alert-danger-soc  { background: rgba(248, 81, 73, 0.1);  border-color: rgba(248, 81, 73, 0.3);  color: var(--critical); }
        .alert-warning-soc { background: rgba(255, 122, 0, 0.1);  border-color: rgba(255, 122, 0, 0.3);  color: var(--accent); }
        .alert-success-soc { background: rgba(86, 211, 100, 0.1); border-color: rgba(86, 211, 100, 0.3); color: var(--info); }

        .demo-info {
            margin-top: 1.5rem;
            padding: 0.75rem 1rem;
            background: var(--bg-tertiary);
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .demo-info code { color: var(--accent); background: transparent; padding: 0; }

        .footer-info {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
            font-size: 0.75rem;
        }
        .form-control { box-sizing: border-box; height: 46px; }
        .form-label { display: block; margin-bottom: 0.4rem; }
        .mb-3, .mb-4 { width: 100%; }
        form { display: flex; flex-direction: column; gap: 0; }
    </style>
</head>
<body>

<div class="login-wrap">

    <div class="brand-block">
        <div class="logo"><i class="bi bi-shield-shaded"></i></div>
        <h1>Corp<span class="accent">Sec</span></h1>
        <div class="subtitle">Information Security Center</div>
    </div>

    <div class="login-card">
        <div th:if="${param.error}" class="alert-soc alert-danger-soc mb-3">
            <i class="bi bi-x-circle"></i> Неверный логин или пароль.
        </div>
        <div th:if="${param.locked}" class="alert-soc alert-warning-soc mb-3">
            <i class="bi bi-lock-fill"></i> Аккаунт временно заблокирован после серии неудачных попыток.
        </div>
        <div th:if="${param.disabled}" class="alert-soc alert-warning-soc mb-3">
            <i class="bi bi-slash-circle"></i> Аккаунт отключён администратором.
        </div>
        <div th:if="${param.logout}" class="alert-soc alert-success-soc mb-3">
            <i class="bi bi-check-circle"></i> Вы вышли из системы.
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="mb-3">
                <label class="form-label">Логин</label>
                <input class="form-control" name="username" placeholder="username или email" autofocus required />
            </div>

            <div class="mb-4">
                <label class="form-label">Пароль</label>
                <input class="form-control" name="password" type="password" required />
            </div>

            <button class="btn btn-login w-100" type="submit">
                <i class="bi bi-box-arrow-in-right"></i> Войти в систему
            </button>
        </form>

        <div class="demo-info">
            <i class="bi bi-info-circle"></i>
            Демо-доступ: <code>admin</code> / <code>Admin123!</code>
        </div>
    </div>

    <div class="footer-info">
        Корпоративная система управления доступом и мониторинга инцидентов ИБ<br/>
        © 2026 CorpSec
    </div>
</div>

</body>
</html>
