<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">

<div class="container py-5" style="max-width: 460px;">
    <div class="text-center mb-4">
        <h1 class="h3">SecurityCourse</h1>
        <div class="text-muted">Вход в систему</div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-4">

            <div th:if="${param.error}" class="alert alert-danger">Неверный логин или пароль.</div>
            <div th:if="${param.locked}" class="alert alert-warning">Аккаунт временно заблокирован из-за большого количества попыток входа.</div>
            <div th:if="${param.disabled}" class="alert alert-warning">Аккаунт отключён администратором.</div>
            <div th:if="${param.logout}" class="alert alert-success">Вы вышли из системы.</div>

            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="mb-3">
                    <label class="form-label">Логин (username или email)</label>
                    <input class="form-control" name="username" placeholder="admin" required />
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input class="form-control" name="password" type="password" required />
                </div>

                <button class="btn btn-primary w-100" type="submit">Войти</button>
            </form>

            <hr class="my-4" />
            <div class="small text-muted">
                Демо-админ: <b>admin</b> / <b>Admin123!</b>
            </div>
        </div>
    </div>
</div>

</body>
</html>
