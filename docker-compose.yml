services:
  postgres:
    image: postgres:17
    container_name: securitycourse-postgres
    environment:
      POSTGRES_DB: securitycourse
      POSTGRES_USER: securitycourse
      POSTGRES_PASSWORD: securitycourse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securitycourse -d securitycourse"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pgdata: